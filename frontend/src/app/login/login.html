<div class="login-container">
  <div class="login-body">
    <div class="login-info">
      <h1>Dobrodošli natrag</h1>
    </div>

    <div class="login-form-wrapper">
      <div class="login-box">
        <form (ngSubmit)="onLogin()">
          <div class="form-group">
            <input 
              type="text" 
              id="username" 
              [(ngModel)]="username" 
              name="username" 
              placeholder="Korisničko ime"
              required
            />
          </div>
          <div class="form-group">
            <input 
              type="password" 
              id="password" 
              [(ngModel)]="password" 
              name="password" 
              placeholder="Lozinka"
              required
            />
          </div>
          <div *ngIf="errorMessage()" class="error-message">
            {{ errorMessage() }}
          </div>
          <button type="submit" class="login-button">Prijava</button>
          <div class="login-link-row">
            <a routerLink="/korisnik/prijava" class="login-link">Prijavi se kao korisnik</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
