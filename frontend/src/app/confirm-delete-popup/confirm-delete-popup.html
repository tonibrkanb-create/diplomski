<div class="confirm-modal-overlay" (click)="onCancel()">
  <div class="confirm-modal-content" (click)="$event.stopPropagation()">
    <h3>{{ title() }}</h3>
    <p>{{ message() }}</p>

    <div class="confirm-modal-actions">
      <button type="button" class="cancel-btn" (click)="onCancel()" [disabled]="loading()">
        {{ cancelLabel() }}
      </button>
      <button type="button" class="confirm-btn" (click)="onConfirm()" [disabled]="loading()">
        {{ loading() ? 'Brišem...' : confirmLabel() }}
      </button>
    </div>
  </div>
</div>
